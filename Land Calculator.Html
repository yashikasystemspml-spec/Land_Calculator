<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yashika Systems - Premium Land Calculator</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #0f172a; 
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: #333;
            padding: 20px;
            overflow-x: hidden;
            position: relative;
        }

        #particleCanvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            pointer-events: none;
        }

        .calculator-card {
            position: relative;
            z-index: 10; 
            background: rgba(255, 255, 255, 0.96); 
            color: #111827;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
            width: 100%;
            max-width: 550px;
            box-sizing: border-box;
            backdrop-filter: blur(8px);
        }

        h1 { color: #16a34a; text-align: center; margin: 0; font-size: 26px; text-transform: uppercase; font-weight: 800; letter-spacing: 0.5px; }
        .datetime-display { text-align: center; font-size: 12px; color: #6b7280; margin-top: 4px; margin-bottom: 10px; font-variant-numeric: tabular-nums; }
        h2 { font-size: 15px; color: #4b5563; text-align: center; margin-bottom: 25px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; }

        .input-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 12px;
        }

        .input-group label { display: block; font-size: 12px; font-weight: 700; color: #4b5563; margin-bottom: 6px; text-transform: uppercase; }
        input[type="number"] {
            width: 100%;
            padding: 12px;
            border: 2px solid #e5e7eb;
            border-radius: 8px;
            font-size: 14px;
            box-sizing: border-box;
            transition: all 0.2s;
        }

        input[type="number"]:focus {
            border-color: #16a34a;
            outline: none;
            background-color: #f0fdf4;
            box-shadow: 0 0 0 3px rgba(22, 163, 74, 0.15);
        }

        .btn-main {
            width: 100%;
            padding: 14px;
            background: #16a34a;
            color: white;
            border: none;
            border-radius: 10px;
            font-weight: bold;
            font-size: 14px;
            cursor: pointer;
            margin: 15px 0;
            text-transform: uppercase;
            box-shadow: 0 4px 6px rgba(22, 163, 74, 0.2);
            transition: background 0.2s;
        }

        .btn-main:hover { background: #15803d; }
        .btn-main:active { transform: translateY(1px); }

        .button-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-top: 5px;
        }

        .btn-sec {
            padding: 12px;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            font-size: 12px;
            text-transform: uppercase;
            transition: all 0.2s;
            box-sizing: border-box;
        }

        .clear-btn { background: #fff; color: #dc2626; border: 2px solid #dc2626; }
        .clear-btn:hover { background: #fef2f2; }
        .pdf-btn { background: #2563eb; border: 2px solid #2563eb; color: white; }
        .pdf-btn:hover { background: #1d4ed8; border-color: #1d4ed8; }

        .list-heading { font-size: 13px; font-weight: 700; color: #16a34a; margin-bottom: 6px; text-transform: uppercase; }
        
        .entry-list-container {
            margin-bottom: 20px;
            max-height: 250px;
            overflow-y: auto;
            border: 2px solid #e5e7eb;
            border-radius: 10px;
            padding: 10px;
            background: #f9fafb;
        }

        .entry-card-block {
            border-bottom: 2px solid #e5e7eb;
            padding: 10px 4px;
            font-size: 13px;
        }
        .entry-card-block:last-child { border-bottom: none; }

        .entry-header-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-weight: bold;
            color: #1e293b;
            margin-bottom: 4px;
        }

        .action-holder {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .row-view-icon {
            cursor: pointer;
            color: #2563eb;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 4px;
            border-radius: 4px;
            transition: background 0.2s, color 0.2s;
        }
        .row-view-icon:hover {
            background: #dbeafe;
            color: #1d4ed8;
        }
        .row-view-icon.active-view {
            color: #16a34a;
            background: #dcfce7;
        }

        .entry-values-text { color: #4b5563; margin-bottom: 6px; font-size: 12.5px; }

        .converted-values-box {
            background: #f8fafc;
            border: 1px dashed #cbd5e1;
            border-radius: 6px;
            padding: 6px 8px;
            font-size: 11.5px;
            margin-top: 4px;
            display: none; 
        }
        
        .pdf-printing .converted-values-box {
            display: block !important;
        }

        .converted-values-box span { font-weight: 700; color: #334155; font-family: monospace; }

        .remove-entry { color: #dc2626; cursor: pointer; font-weight: bold; padding: 0 5px; font-size: 16px; }

        .pdf-hide { display: none !important; }

        .results-section {
            margin-top: 25px;
            padding-top: 15px;
            border-top: 2px dashed #e5e7eb;
        }
        
        .section-title { font-weight: 800; text-align: center; margin-bottom: 12px; font-size: 13px; letter-spacing: 0.5px; color: #374151; }

        .result-row { display: flex; justify-content: space-between; padding: 6px 0; font-size: 14px; border-bottom: 1px dashed #f3f4f6; }
        .result-row:last-child { border-bottom: none; }
        .result-label { font-weight: 600; color: #4b5563; }
        .result-value { font-weight: 700; color: #111827; font-family: monospace; font-size: 15px; }
        
        .grand-totals .result-value { color: #16a34a; }

        .brand-footer { text-align: center; margin-top: 25px; font-size: 11px; color: #9ca3af; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; }
    </style>
</head>
<body>

    <canvas id="particleCanvas"></canvas>

    <div class="calculator-card" id="calculator-content">
        <h1>Yashika Systems</h1>
        <div id="liveTime" class="datetime-display"></div>
        <h2>Multi-Entry Land Calculator</h2>
        
        <div id="inputForm">
            <div class="input-row">
                <div class="input-group"><label>Hectares</label><input type="number" id="hectares" placeholder="0" step="any"></div>
                <div class="input-group"><label>Acres</label><input type="number" id="acres" placeholder="0" step="any"></div>
            </div>
            <div class="input-row">
                <div class="input-group"><label>Cents</label><input type="number" id="cents" placeholder="0" step="any"></div>
                <div class="input-group"><label>Sq. Feet</label><input type="number" id="sqFeet" placeholder="0" step="any"></div>
            </div>
            <div class="input-group" style="margin-bottom: 10px;">
                <label>Square Meters</label>
                <input type="number" id="sqMeters" placeholder="0" step="any">
            </div>
        </div>

        <button class="btn-main" id="addButton" onclick="addEntry()">+ Add Entry (Enter)</button>

        <div id="listContainer" style="display:none;">
            <div class="list-heading">Saved Entries Summary:</div>
            <div class="entry-list-container" id="entryList"></div>
        </div>

        <div class="button-grid">
            <button class="btn-sec clear-btn" onclick="clearAll()">Clear All</button>
            <button class="btn-sec pdf-btn" onclick="downloadPDF()">Download PDF</button>
        </div>

        <div class="results-section grand-totals">
            <div class="section-title" style="color: #16a34a;">FINAL OVERALL GRAND TOTALS</div>
            <div class="result-row"><span class="result-label">Hectares (Hec):</span><span class="result-value" id="resHec">0.0000</span></div>
            <div class="result-row"><span class="result-label">Acres (Acr):</span><span class="result-value" id="resAcr">0.0000</span></div>
            <div class="result-row"><span class="result-label">Cents (Cen):</span><span class="result-value" id="resCen">0.0000</span></div>
            <div class="result-row"><span class="result-label">Sq. Feet (SqF):</span><span class="result-value" id="resSqF">0.0000</span></div>
            <div class="result-row"><span class="result-label">Sq. Meters (SqM):</span><span class="result-value" id="resSqM">0.0000</span></div>
        </div>

        <div class="brand-footer">Powered by Yashika Systems</div>
    </div>

    <script>
        let entries = [];

        const TO_SQM = {
            hec: 10000,
            acr: 4046.8564224,
            cen: 40.468564224,
            sqf: 0.09290304,
            sqm: 1
        };

        function updateClock() {
            const now = new Date();
            const options = { day: '2-digit', month: 'short', year: 'numeric', hour: '2-digit', minute: '2-digit', second: '2-digit' };
            document.getElementById('liveTime').innerText = now.toLocaleString('en-GB', options);
        }
        setInterval(updateClock, 1000);
        updateClock();

        document.getElementById('inputForm').addEventListener('keypress', function (e) {
            if (e.key === 'Enter') {
                addEntry();
            }
        });

        function convertFromSqM(sqmValue) {
            return {
                hec: sqmValue / TO_SQM.hec,
                acr: sqmValue / TO_SQM.acr,
                cen: sqmValue / TO_SQM.cen,
                sqf: sqmValue / TO_SQM.sqf,
                sqm: sqmValue
            };
        }

        function addEntry() {
            const entryInputs = {
                hec: parseFloat(document.getElementById('hectares').value) || 0,
                acr: parseFloat(document.getElementById('acres').value) || 0,
                cen: parseFloat(document.getElementById('cents').value) || 0,
                sqf: parseFloat(document.getElementById('sqFeet').value) || 0,
                sqm: parseFloat(document.getElementById('sqMeters').value) || 0
            };

            if (Object.values(entryInputs).every(v => v === 0)) return;

            const totalSqmForEntry = 
                (entryInputs.hec * TO_SQM.hec) +
                (entryInputs.acr * TO_SQM.acr) +
                (entryInputs.cen * TO_SQM.cen) +
                (entryInputs.sqf * TO_SQM.sqf) +
                (entryInputs.sqm * TO_SQM.sqm);
            
            entries.push({ inputs: entryInputs, sqmBase: totalSqmForEntry, showBreakdown: false });

            renderList();
            calculateTotals();
            
            ['hectares', 'acres', 'cents', 'sqFeet', 'sqMeters'].forEach(id => document.getElementById(id).value = '');
            document.getElementById('hectares').focus();
        }

        function removeEntry(index) {
            entries.splice(index, 1);
            renderList();
            calculateTotals();
        }

        function toggleBreakdownView(index) {
            entries[index].showBreakdown = !entries[index].showBreakdown;
            renderList();
        }

        function renderList() {
            const listDiv = document.getElementById('entryList');
            const container = document.getElementById('listContainer');
            listDiv.innerHTML = '';
            
            if (entries.length === 0) {
                container.style.display = 'none';
                return;
            }
            container.style.display = 'block';

            entries.forEach((item, i) => {
                const singleConvertedValues = convertFromSqM(item.sqmBase);

                let textParts = [];
                let e = item.inputs;
                if(e.hec) textParts.push(`${e.hec} Hec`);
                if(e.acr) textParts.push(`${e.acr} Acr`);
                if(e.cen) textParts.push(`${e.cen} Cen`);
                if(e.sqf) textParts.push(`${e.sqf} SqF`);
                if(e.sqm) textParts.push(`${e.sqm} SqM`);

                const block = document.createElement('div');
                block.className = 'entry-card-block';
                
                const boxDisplayStyle = item.showBreakdown ? 'block' : 'none';
                const eyeIconClass = item.showBreakdown ? 'row-view-icon active-view' : 'row-view-icon';

                block.innerHTML = `
                    <div class="entry-header-row">
                        <span>ENTRY #${i+1}</span>
                        <div class="action-holder">
                            <span class="${eyeIconClass}" title="Toggle Entry Preview Breakdown" onclick="toggleBreakdownView(${i})">
                                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                                    <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                                    <circle cx="12" cy="12" r="3"></circle>
                                </svg>
                            </span>
                            <span class="remove-entry pdf-hide" onclick="removeEntry(${i})">&times;</span>
                        </div>
                    </div>
                    <div class="entry-values-text">${textParts.join(', ')}</div>
                    <div class="converted-values-box" style="display: ${boxDisplayStyle};">
                        <strong>→ ENTRY CONVERTED VALUES:</strong><br>
                        ${singleConvertedValues.hec.toFixed(4)} Hec | ${singleConvertedValues.acr.toFixed(4)} Acr | ${singleConvertedValues.cen.toFixed(4)} Cen | ${singleConvertedValues.sqf.toFixed(4)} SqF | ${singleConvertedValues.sqm.toFixed(4)} SqM
                    </div>
                `;
                listDiv.appendChild(block);
            });
        }

        function calculateTotals() {
            let globalSqMTotal = 0;
            entries.forEach(item => {
                globalSqMTotal += item.sqmBase;
            });

            const finalGrandTotals = convertFromSqM(globalSqMTotal);

            document.getElementById('resHec').innerText = finalGrandTotals.hec.toFixed(4);
            document.getElementById('resAcr').innerText = finalGrandTotals.acr.toFixed(4);
            document.getElementById('resCen').innerText = finalGrandTotals.cen.toFixed(4);
            document.getElementById('resSqF').innerText = finalGrandTotals.sqf.toFixed(4);
            document.getElementById('resSqM').innerText = finalGrandTotals.sqm.toFixed(4);
        }

        function clearAll() {
            entries = [];
            renderList();
            calculateTotals();
        }

        function downloadPDF() {
            const element = document.getElementById('calculator-content');
            const listContainer = document.getElementById('entryList');
            
            if (listContainer) {
                listContainer.style.maxHeight = 'none';
                listContainer.style.overflowY = 'visible';
            }

            element.classList.add('pdf-printing');

            const hiddenElements = document.querySelectorAll('.pdf-hide, .row-view-icon');
            hiddenElements.forEach(el => el.style.setProperty('display', 'none', 'important'));

            const opt = {
                margin: 0.4,
                filename: `Land_Batch_Report_${new Date().getTime()}.pdf`,
                image: { type: 'jpeg', quality: 0.98 },
                html2canvas: { scale: 2, useCORS: true },
                jsPDF: { unit: 'in', format: 'letter', orientation: 'portrait' }
            };

            html2pdf().set(opt).from(element).save().then(() => {
                if (listContainer) {
                    listContainer.style.maxHeight = '250px';
                    listContainer.style.overflowY = 'auto';
                }
                element.classList.remove('pdf-printing');
                hiddenElements.forEach(el => el.style.display = '');
            });
        }

        /* Particles Backdrop Engine */
        const canvas = document.getElementById('particleCanvas');
        const ctx = canvas.getContext('2d');
        let width = canvas.width = window.innerWidth;
        let height = canvas.height = window.innerHeight;
        const numParticles = 80;
        const particles = [];

        window.addEventListener('resize', () => {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        });

        class Particle {
            constructor() { this.reset(); }
            reset() {
                this.x = (Math.random() - 0.5) * width * 1.5;
                this.y = (Math.random() - 0.5) * height * 1.5;
                this.z = Math.random() * 400 + 100; 
                this.velocityZ = -(Math.random() * 0.8 + 0.2);
                this.radius = 2.5;
            }
            update() {
                this.z += this.velocityZ;
                if (this.z <= 0) { this.reset(); this.z = 500; }
            }
            draw() {
                const k = 300 / this.z;
                const px = this.x * k + width / 2;
                const py = this.y * k + height / 2;
                if (px >= 0 && px <= width && py >= 0 && py <= height) {
                    const size = (500 - this.z) / 100 * this.radius;
                    const opacity = (500 - this.z) / 500;
                    ctx.beginPath();
                    ctx.arc(px, py, Math.max(0.1, size), 0, Math.PI * 2);
                    ctx.fillStyle = `rgba(34, 197, 94, ${opacity * 0.7})`;
                    ctx.fill();
                }
            }
        }

        for (let i = 0; i < numParticles; i++) { particles.push(new Particle()); }

        function animate() {
            ctx.clearRect(0, 0, width, height);
            ctx.fillStyle = 'rgba(15, 23, 42, 1)';
            ctx.fillRect(0, 0, width, height);
            for (let i = 0; i < particles.length; i++) {
                particles[i].update();
                particles[i].draw();
                for (let j = i + 1; j < particles.length; j++) {
                    const k1 = 300 / particles[i].z;
                    const x1 = particles[i].x * k1 + width / 2;
                    const y1 = particles[i].y * k1 + height / 2;
                    const k2 = 300 / particles[j].z;
                    const x2 = particles[j].x * k2 + width / 2;
                    const y2 = particles[j].y * k2 + height / 2;
                    const dist = Math.hypot(x1 - x2, y1 - y2);
                    if (dist < 110) {
                        const alpha = (1 - dist / 110) * 0.15 * ((500 - particles[i].z) / 500);
                        ctx.beginPath();
                        ctx.moveTo(x1, y1);
                        ctx.lineTo(x2, y2);
                        ctx.strokeStyle = `rgba(99, 102, 241, ${alpha})`;
                        ctx.lineWidth = 0.8;
                        ctx.stroke();
                    }
                }
            }
            requestAnimationFrame(animate);
        }
        animate();
    </script>
</body>
</html>
